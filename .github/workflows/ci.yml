name: CI

on:
  push:
    branches:
      - 'feat/**'
  pull_request:
    branches: [ main ]

jobs:
  test-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create local.properties
        run: echo "API_BASE_URL=https://api.playbook.app" >> local.properties
      - name: Run shared tests
        run: ./gradlew :shared:allTests

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create local.properties
        run: echo "API_BASE_URL=https://api.playbook.app" >> local.properties
      - name: Run server tests
        run: ./gradlew :server:test

  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create local.properties
        run: echo "API_BASE_URL=https://api.playbook.app" >> local.properties
      - name: Run android tests
        run: ./gradlew :composeApp:testDebugUnitTest

  android-build-check:
    name: Android Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Create local.properties
        run: echo "API_BASE_URL=https://api.playbook.app" >> local.properties
      - name: Assemble Debug
        run: ./gradlew :androidApp:assembleDebug

