name: Deploy Android to Updraft

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build APK + Upload to Updraft
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/production' && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create local.properties
        run: echo "API_BASE_URL=${{ vars.API_BASE_URL }}" >> local.properties

      - name: Decode Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > composeApp/release.jks

      - name: Build Release APK
        run: ./gradlew :composeApp:assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload to Updraft
        run: |
          APK_PATH=$(find composeApp/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find APK file."
            exit 1
          fi
          echo "Uploading: $APK_PATH"
          curl -v -X PUT --http1.1 \
            -F "app=@$APK_PATH" \
            -F "whats_new=Build from GitHub Actions. Run: ${GITHUB_RUN_NUMBER}" \
            -F "build_version=${GITHUB_RUN_NUMBER}" \
            "https://app.getupdraft.com/api/app_upload/${{ secrets.UPDRAFT_APP_KEY }}/${{ secrets.UPDRAFT_API_KEY }}/"
