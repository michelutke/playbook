name: Test Suite

on:
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teamorg_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run server tests
        run: ./gradlew :server:test

  test-shared:
    name: Shared KMP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run shared JVM tests
        run: ./gradlew :shared:allTests

  test-android:
    name: Android Unit Tests
    runs-on: ubuntu-latest
    needs: [ test-backend, test-shared ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  test-ios:
    name: iOS UI Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Create simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes available -j | python3 -c "
          import json, sys
          rts = json.load(sys.stdin)['runtimes']
          ios = [r for r in rts if 'iOS' in r.get('name','') and r.get('isAvailable', False)]
          print(sorted(ios, key=lambda r: r['version'])[-1]['identifier'])
          ")
          echo "Runtime: $RUNTIME"
          UDID=$(xcrun simctl create 'CI-iPhone' 'iPhone 16' "$RUNTIME" 2>/dev/null || \
                 xcrun simctl create 'CI-iPhone' 'iPhone 15' "$RUNTIME")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
      - name: Run iOS UI Tests
        run: |
          set -o pipefail
          xcodebuild test \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp-Workspace \
            -destination "id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult \
            | xcpretty --report junit --output test-results-ios.xml
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-results
          path: |
            TestResults.xcresult
            test-results-ios.xml
