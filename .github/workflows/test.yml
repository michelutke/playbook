name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Backend + Shared + Admin (parallel)
  # ──────────────────────────────────────────────

  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playbook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Run server tests
        run: ./gradlew :server:test

  test-shared:
    name: Shared KMP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Run shared JVM tests
        run: ./gradlew :shared:jvmTest

  test-admin:
    name: Admin Panel Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playbook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5433:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Install admin dependencies
        working-directory: admin
        run: npm ci
      - name: Run Vitest unit tests
        working-directory: admin
        run: npm test
      - name: Install Playwright browsers
        working-directory: admin
        run: npx playwright install chromium --with-deps
      - name: Build server for E2E
        run: ./gradlew :server:shadowJar
      - name: Run Playwright E2E tests
        working-directory: admin
        run: npm run test:e2e
        env:
          PORT: 8088

  # ──────────────────────────────────────────────
  # Phase 2: Android (parallel with admin, after Phase 1)
  # ──────────────────────────────────────────────

  test-android:
    name: Android UI Tests (Robolectric)
    runs-on: ubuntu-latest
    needs: [test-backend, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  # ──────────────────────────────────────────────
  # Phase 2: iOS (macOS runner, main branch only)
  # ──────────────────────────────────────────────

  test-ios:
    name: iOS XCTest Smoke Tests
    runs-on: macos-14
    needs: [test-backend, test-shared]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v3
      - name: Build KMP framework for iOS
        run: ./gradlew :composeApp:assembleXCFramework
      - name: Run iOS XCTest smoke tests
        run: |
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty
