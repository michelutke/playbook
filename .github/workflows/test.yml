name: Test Suite

on:
  push:
    branches:
      - 'feat/**'
  pull_request:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Backend + Shared + Admin (parallel)
  # ──────────────────────────────────────────────

  test-backend:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: playbook_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run server tests
        run: ./gradlew :server:test

  test-shared:
    name: Shared KMP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run shared JVM tests
        run: ./gradlew :shared:allTests

  test-admin:
    name: Admin Panel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "admin/package-lock.json"
      - name: Install admin dependencies
        working-directory: admin
        run: npm ci
      - name: Generate SvelteKit types
        working-directory: admin
        run: npx svelte-kit sync
      - name: Run Vitest unit tests
        working-directory: admin
        run: npm test

  # ──────────────────────────────────────────────
  # Phase 2: Android (parallel with admin, after Phase 1)
  # ──────────────────────────────────────────────

  test-android:
    name: Android UI Tests (Robolectric)
    runs-on: ubuntu-latest
    needs: [test-backend, test-shared]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3
      - name: Run Android unit tests
        run: ./gradlew :composeApp:testDebugUnitTest

  # ──────────────────────────────────────────────
  # Phase 2: iOS (macOS runner, main branch only)
  # ──────────────────────────────────────────────

  test-ios:
    name: iOS XCTest Smoke Tests
    runs-on: macos-14
    needs: [test-backend, test-shared]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v3

      - name: Start PostgreSQL
        run: |
          PG=$(brew list --formula 2>/dev/null | grep "^postgresql@" | sort -V | tail -1)
          if [ -z "$PG" ]; then
            brew install postgresql@16
            PG="postgresql@16"
          fi
          PG_BIN="/opt/homebrew/opt/$PG/bin"
          PG_DATA="/opt/homebrew/var/$PG"
          echo "$PG_BIN" >> $GITHUB_PATH
          export PATH="$PG_BIN:$PATH"
          # Force trust auth — avoids SCRAM/password issues on TCP connections
          [ -f "$PG_DATA/pg_hba.conf" ] && sed -i '' 's/scram-sha-256/trust/g' "$PG_DATA/pg_hba.conf"
          brew services start "$PG"
          sleep 5
          # Use runner superuser (created by initdb) — no separate role needed
          createdb playbook_ios_test

      - name: Build and start Ktor backend
        run: |
          ./gradlew :server:installDist
          server/build/install/server/bin/server > /tmp/ktor.log 2>&1 &
          echo $! > ktor.pid
          echo "Server PID: $(cat ktor.pid)"
        env:
          # runner is the postgres superuser — no user/password needed with trust auth
          DATABASE_URL: jdbc:postgresql://localhost:5432/playbook_ios_test
          JWT_SECRET: ios-ci-test-secret
          PORT: 8080

      - name: Wait for backend health
        run: |
          for i in $(seq 1 30); do
            if ! kill -0 $(cat ktor.pid 2>/dev/null) 2>/dev/null; then
              echo "Server process died. Logs:"; cat /tmp/ktor.log; exit 1
            fi
            if curl -sf http://localhost:8080/health; then
              echo "Backend ready after $i attempts"; exit 0
            fi
            echo "Waiting... ($i/30)"; sleep 3
          done
          echo "Server never became healthy. Logs:"; cat /tmp/ktor.log; exit 1

      - name: Seed test data
        run: |
          RESPONSE=$(curl -sf -X POST http://localhost:8080/auth/register \
            -H 'Content-Type: application/json' \
            -d '{"email":"test@playbook.test","password":"testpassword","displayName":"Test Coach"}')
          USER_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['userId'])")
          CLUB_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
          TEAM_ID=$(python3 -c "import uuid; print(uuid.uuid4())")
          PG="psql -d playbook_ios_test"
          $PG -c "INSERT INTO clubs (id, name, sport_type, created_at, updated_at) VALUES ('$CLUB_ID', 'Test Club', 'volleyball', now(), now());"
          $PG -c "INSERT INTO club_roles (id, user_id, club_id, role, created_at) VALUES (gen_random_uuid(), '$USER_ID', '$CLUB_ID', 'club_manager', now());"
          $PG -c "INSERT INTO teams (id, club_id, name, created_at, updated_at) VALUES ('$TEAM_ID', '$CLUB_ID', 'Test Team', now(), now());"
          $PG -c "INSERT INTO team_roles (id, user_id, team_id, role, created_at) VALUES (gen_random_uuid(), '$USER_ID', '$TEAM_ID', 'coach', now());"
          echo "Seed complete"

      - name: Install Tuist
        run: brew install tuist/tuist/tuist

      - name: Build KMP framework (iosSimulatorArm64)
        run: ./gradlew :composeApp:linkDebugFrameworkIosSimulatorArm64

      - name: Generate Xcode project
        run: cd iosApp && tuist install && tuist generate --no-open

      - name: Run iOS XCTest smoke tests
        run: |
          xcodebuild test \
            -workspace iosApp/iosApp.xcworkspace \
            -scheme iosApp \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            API_BASE_URL=http://localhost:8080 \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty

      - name: Stop backend
        if: always()
        run: |
          kill $(cat ktor.pid) 2>/dev/null || true
          echo "=== Server logs ===" && cat /tmp/ktor.log || true
