ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ch.teamorg.ApplicationKt.module]
  }
}

jwt {
  secret = ${JWT_SECRET}
  issuer = "teamorg"
  audience = "teamorg-users"
  realm = "teamorg"
  expiry-days = 30
}

database {
  url = ${DATABASE_URL}
  driver = "org.postgresql.Driver"
}
