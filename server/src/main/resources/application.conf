ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [com.playbook.ApplicationKt.module]
  }
}

jwt {
  secret = ${JWT_SECRET}
  issuer = "playbook"
  audience = "playbook-users"
  realm = "playbook"
  expiry-days = 30
}

database {
  url = ${DATABASE_URL}
  driver = "org.postgresql.Driver"
}
