ktor {
  deployment {
    port = 8080
  }
  application {
    modules = [ch.teamorg.ApplicationKt.module]
  }
}

jwt {
  secret = "dev-secret-change-in-production"
  secret = ${?JWT_SECRET}
  issuer = "teamorg"
  audience = "teamorg-users"
  realm = "teamorg"
  expiry-days = 30
}

database {
  url = "jdbc:postgresql://localhost:5432/teamorg?user=miggi"
  url = ${?DATABASE_URL}
  driver = "org.postgresql.Driver"
}

onesignal {
  app-id = ""
  app-id = ${?ONESIGNAL_APP_ID}
  api-key = ""
  api-key = ${?ONESIGNAL_API_KEY}
}
