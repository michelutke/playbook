appId: com.playbook.android
---
# TS-045: Full coach journey smoke test
# Login -> Dashboard -> Team (or empty state) -> Notifications -> Back

# --- Login ---
- launchApp:
    clearState: true

- assertVisible: "Login"

- tapOn:
    text: "Email"
- inputText: "${COACH_EMAIL}"

- tapOn:
    text: "Password"
- inputText: "${COACH_PASSWORD}"

- tapOn: "Login"

- waitForAnimationToEnd

# --- Dashboard ---
- assertVisible: "Home"

# Tap a team if one exists, otherwise verify empty-state text
- tapOn:
    text: ".*members.*"
    regex: true
    optional: true

- waitForAnimationToEnd:
    timeout: 2000

# Go back if we navigated into a team
- pressKey: Back
    optional: true

- waitForAnimationToEnd

# --- Notifications tab ---
- tapOn: "Notifications"

- waitForAnimationToEnd

- assertVisible: "Notifications"

# --- Back to Home ---
- tapOn: "Home"

- waitForAnimationToEnd

- assertVisible: "Home"
