services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playbook_e2e
      POSTGRES_USER: playbook
      POSTGRES_PASSWORD: playbook
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playbook -d playbook_e2e"]
      interval: 5s
      timeout: 5s
      retries: 10
