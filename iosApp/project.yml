name: iosApp
options:
  deploymentTarget:
    iOS: "16.0"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iosApp
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: "5.9"
      ENABLE_BITCODE: NO
    dependencies:
      - framework: ../composeApp/build/XCFrameworks/debug/composeApp.xcframework
        embed: true
        codeSign: false
      - sdk: libsqlite3.tbd
