name: iosApp
options:
  deploymentTarget:
    iOS: "16.0"

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosApp
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iosApp
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: 1
      MARKETING_VERSION: 1.0
      SWIFT_VERSION: "5.9"
      ENABLE_BITCODE: NO
    preBuildScripts:
      - name: Build KMP Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: ../composeApp/build/XCFrameworks/debug/composeApp.xcframework
        embed: true
        codeSign: false
      - sdk: libsqlite3.tbd

  iosAppUITests:
    type: com.apple.product-type.bundle.ui-testing
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: iosAppUITests
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.playbook.iosAppUITests
      GENERATE_INFOPLIST_FILE: YES
      SWIFT_VERSION: "5.9"
      TEST_TARGET_NAME: iosApp
    dependencies:
      - target: iosApp

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
        iosAppUITests: [test]
    test:
      targets:
        - iosAppUITests
