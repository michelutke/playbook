appId: com.playbook.android
---
# TS-044: Register new coach -> Club Dashboard appears
- launchApp:
    clearState: true

- assertVisible: "Login"

- tapOn: "Switch to Register"

- assertVisible: "Register"

- tapOn:
    text: "Email"
- inputText: "${COACH_EMAIL}"

- tapOn:
    text: "Password"
- inputText: "${COACH_PASSWORD}"

- tapOn:
    text: "Display name (optional)"
- inputText: "${COACH_DISPLAY_NAME}"

- tapOn: "Register"

- waitForAnimationToEnd

# After registration a coach must set up their club or is taken to the dashboard
- assertVisible:
    text: "Teams"
    optional: true
- assertVisible:
    text: "Dashboard"
    optional: true
