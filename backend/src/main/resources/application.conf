ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [com.playbook.ApplicationKt.module]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/playbook"
    url = ${?DATABASE_URL}
    user = "playbook"
    user = ${?DATABASE_USER}
    password = "playbook"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

smtp {
    host = "localhost"
    host = ${?SMTP_HOST}
    port = 587
    port = ${?SMTP_PORT}
    user = ""
    user = ${?SMTP_USER}
    password = ""
    password = ${?SMTP_PASS}
    fromAddress = "noreply@playbook.app"
    fromAddress = ${?SMTP_FROM}
    fromName = "Playbook"
}

jwt {
    secret = "change-me-in-production"
    secret = ${?JWT_SECRET}
    issuer = "playbook"
    audience = "playbook-app"
    expirationHours = 24
}

app {
    baseUrl = "https://app.playbook.example"
    baseUrl = ${?APP_BASE_URL}
}

cors {
    allowedHost = "localhost:3000"
    allowedHost = ${?CORS_ALLOWED_HOST}
}

billing {
    rateChf = 1.0
    rateChf = ${?BILLING_RATE_CHF}
}

sa {
    # SA master password — MUST be overridden via SA_PASSWORD env var in production
    password = ""
    password = ${?SA_PASSWORD}
}
